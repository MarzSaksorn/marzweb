<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marzweb</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet" />
    <link rel="shortcut icon" href="/src/img/Marz.jpg" type="image/x-icon" />
    <link rel="stylesheet" href="/src/style.css" />
</head>

<body id="body" style="font-family: &quot;Montserrat&quot;, sans-serif"
    class="h-screen bg-[url(/src/background/white1-bg.jpg)] bg-white dark:bg-[url(/src/background/dark-bg.jpg)] dark:bg-neutral-900 dark">
    <!-------Navigation Bar------>

    <div class="drawer">
        <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content flex flex-col">
            <!-- Navbar -->
            <div class="navbar bg-base-300/70 w-full">
                <div class="flex-none lg:drawer-open">
                    <label for="my-drawer-2" aria-label="open sidebar" class="btn btn-square btn-ghost">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            class="inline-block h-6 w-6 stroke-current">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </label>
                </div>
                <div class="lg:ml-5 lg:mx-1 px-2">
                    <img src="/src/img/Marz.jpg" alt="" class="h-10 w-10 rounded-sm" />
                </div>
                <div class="mx-2 ml-0 flex-1 px-2 text-lg">Marzweb</div>
                <div class="hidden flex-none lg:block">
                    <ul class="menu menu-horizontal">
                        <!-- Navbar menu content here -->
                        <li class="px-6 text-lg"><a href="/Projects/">Projects</a></li>
                        <li class="px-6 text-lg"><a href="/Contact/">Contacts</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="drawer-side">
            <label for="my-drawer-2" aria-label="close sidebar" class="drawer-overlay"></label>
            <ul class="menu bg-base-200 min-h-full w-80 p-4">
                <!-- Sidebar content here -->
                <li><a>Sidebar Item 1</a></li>
                <li><a>Sidebar Item 2</a></li>
            </ul>
        </div>
    </div>

    <!------Navigation Bar--------->

    <div id="headline" class="grid w-auto mt-16 p-4 text-black items-start" ;>
        <h1 class="font-bold text-black text-4xl text-center dark:text-white lg:text-6xl">
            Welcome to Marzweb!
        </h1>
    </div>
    <div class="flex mt-14 justify-center items-center">
        <div id="links" class="mr-32 p-8 relative justify-center items-start lg:mr-48">
            <a href="/Projects/">
                <button
                    class="flex p-8 text-black bg-white/85 transition-all absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 btn items-center border-white hover:bg-sky-300/65 hover:p-9 active:p-7 btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl">
                    <img src="/src/img/GitHub_Logo.png" alt="" class="w-10" />
                    <p class="text-lg">Projects</p>
                </button>
            </a>
        </div>
        <div id="links" class="p-8 relative justify-center items-start">
            <a href="/Projects/">
                <button
                    class="flex p-8 text-black bg-white/85 transition-all absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 btn items-center border-white hover:bg-sky-300/65 hover:p-9 active:p-7 btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl">
                    <img src="/src/img/GitHub_Logo.png" alt="" class="w-10" />
                    <p class="text-lg">Projects</p>
                </button>
            </a>
        </div>
    </div>
</body>

</html>
