<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marzweb</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet" />
    <link rel="shortcut icon" href="/src/img/Marz.jpg" type="image/x-icon" />
    <link rel="stylesheet" href="/src/style.css" />
</head>

<body id="body" style="font-family: 'Brush Script MT', cursive, sans-serif"
    class="min-h-screen bg-[url(/src/background/white1-bg.jpg)] bg-white dark:bg-[url(/src/background/dark-bg.jpg)] dark:bg-neutral-900 dark bg-fixed bg-center bg-no-repeat">
    <!-------Navigation Bar------>

    <div class="drawer">
        <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content flex flex-col">
            <!-- Navbar -->
            <div class="navbar bg-base-300/70 w-full">
                <div class="flex-none lg:drawer-open">
                    <label for="my-drawer-2" aria-label="open sidebar" class="btn btn-square btn-ghost">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            class="inline-block h-6 w-6 stroke-current">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </label>
                </div>
                <div class="lg:ml-5 lg:mx-1 px-2">
                    <img src="/src/img/Marz.jpg" alt="" class="h-10 w-10 rounded-sm" />
                </div>
                <div class="mx-2 ml-0 flex-1 px-2 text-lg">Marzweb</div>
                <div class="hidden flex-none lg:block">
                    <ul class="menu menu-horizontal">
                        <!-- Navbar menu content here -->
                        <li class="px-6 text-lg"><a href="/Projects/">Projects</a></li>
                        <li class="px-6 text-lg"><a href="/Contact/">Contacts</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="drawer-side">
            <label for="my-drawer-2" aria-label="close sidebar" class="drawer-overlay"></label>
            <ul class="menu bg-base-200 min-h-full w-80 p-4">
                <!--Sidebar content here-->
                <li><a href="/Projects/"><img src="/src/img/GitHub_Invertocat_White.png" alt="" class="w-8">My
                        Projects</a></li>
            </ul>
        </div>

    </div>

    <!------Navigation Bar--------->

    <div class="grid lg:flex justify-items-stretch w-full mt-16">
        <div class="w-full">
            <h1 class="p-6 justify-self-center text-center text-7xl font-extrabold">Welcome To Marzweb!</h1>
        </div>
        <div class="w-full lg:w-1/4 mt-10">
            <h1 class="bg-slate-400/75 p-3 rounded-lg justify-self-center text-black text-2xl text-center dark:text-white lg:text-4xl">
                Current Project
            </h1>
            <div class="justify-self-center card bg-base-100 w-96 shadow-sm mx-9 m-7">
                <figure>
                    <img class="h-95" src="/src/img/Marzweb.png" alt="Marzweb" />
                </figure>
                <div class="card-body">
                    <h2 class="card-title">Marzweb (Vite Revamped)</h2>
                    <p>The homepage of my everything</p>
                    <div class="card-actions justify-end">
                        <button class="btn btn-primary">Buy Now</button>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</body>

</html>
